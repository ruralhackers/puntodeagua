version: "3.8"

volumes:
  punto_de_agua_postgres:

services:
  postgres:
    image: postgres:15
    container_name: punto_de_agua_postgres
    restart: always
    ports:
      - 5555:5432
    environment:
      POSTGRES_DB: punto_de_agua_local
      POSTGRES_USER: punto_de_agua_user
      POSTGRES_PASSWORD: punto_de_agua_password
    volumes:
      - punto_de_agua_postgres:/var/lib/postgresql/data

